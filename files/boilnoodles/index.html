<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Unity WebGL Player | boil Noodles at Night</title>
    <base
      href="https://cdn.jsdelivr.net/gh/SomeRandomFella/portsandrips@master/boilnoodles/"
    />
    <link rel="shortcut icon" href="TemplateData/favicon.ico" />
    <link rel="stylesheet" href="TemplateData/style.css" />
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width="960" height="600"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"></div>
      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">boil Noodles at Night</div>
      </div>
    </div>
    <script>
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length
            ? "block"
            : "none";
        }
        var div = document.createElement("div");
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == "error") div.style = "background: red; padding: 10px;";
        else {
          if (type == "warning")
            div.style = "background: yellow; padding: 10px;";
          setTimeout(function () {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/WebGLBuild.loader.js";
      var config = {
        frameworkUrl: buildUrl + "/WebGLBuild.framework.js",
        dataUrl: buildUrl + "/WebGLBuild.data",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "arydk",
        productName: "boil Noodles at Night",
        productVersion: "0.1",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        container.className = "unity-mobile";
        config.devicePixelRatio = 1;
        unityShowBanner("WebGL builds are not supported on mobile devices.");
      } else {
        canvas.style.width = "960px";
        canvas.style.height = "600px";
      }

      loadingBar.style.display = "block";

      function fetchAndMergeWasm() {
        return Promise.all([
          fetch(buildUrl + "/WebGLBuild.wasm.part001").then((r) =>
            r.arrayBuffer(),
          ),
          fetch(buildUrl + "/WebGLBuild.wasm.part002").then((r) =>
            r.arrayBuffer(),
          ),
        ]).then(function (buffers) {
          var total = buffers.reduce(function (s, b) {
            return s + b.byteLength;
          }, 0);
          var merged = new Uint8Array(total);
          var offset = 0;
          buffers.forEach(function (b) {
            merged.set(new Uint8Array(b), offset);
            offset += b.byteLength;
          });
          return new Blob([merged], { type: "application/wasm" });
        });
      }

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = function () {
        fetchAndMergeWasm()
          .then(function (wasmBlob) {
            config.codeUrl = URL.createObjectURL(wasmBlob);
            createUnityInstance(canvas, config, function (progress) {
              progressBarFull.style.width = 100 * progress + "%";
            })
              .then(function (unityInstance) {
                loadingBar.style.display = "none";
                fullscreenButton.onclick = function () {
                  unityInstance.SetFullscreen(1);
                };
              })
              .catch(function (message) {
                alert(message);
              });
          })
          .catch(function (err) {
            alert("Failed to load wasm parts: " + err);
          });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
