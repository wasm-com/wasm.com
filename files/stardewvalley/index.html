<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stardew Valley</title>
    <base
      href="https://cdn.jsdelivr.net/gh/cirsius/stardew-wasm@master/"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #loading {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font: 1.5rem/1 sans-serif;
        z-index: 1;
        flex-direction: column;
        gap: 1rem;
      }
      #loading.hidden {
        display: none;
      }
      #music-choice {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
      }
      #music-choice button {
        font: 1.1rem/1 sans-serif;
        padding: 0.6rem 1.5rem;
        border: 2px solid #fff;
        border-radius: 6px;
        background: transparent;
        color: #fff;
        cursor: pointer;
        min-width: 260px;
        transition: background 0.15s;
      }
      #music-choice button:hover {
        background: rgba(255, 255, 255, 0.15);
      }
      #music-choice .hint {
        font-size: 0.85rem;
        opacity: 0.6;
      }
      canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div id="music-choice">
        <div>Download options</div>
        <button id="btn-no-music">
          Play without music <span class="hint">(~64 MB)</span>
        </button>
        <button id="btn-with-music">
          Play with music <span class="hint">(~540 MB)</span>
        </button>
      </div>
    </div>
    <script>
      const originalFetch = window.fetch;
      window.fetch = function (resource, options = {}) {
        options.credentials = "omit";
        return originalFetch(resource, options);
      };

      (function() {
        var originalGetDirectory = navigator.storage && navigator.storage.getDirectory
          ? navigator.storage.getDirectory.bind(navigator.storage) : null;

        function openIDB() {
          return new Promise(function(resolve, reject) {
            var req = indexedDB.open("stardew-opfs-polyfill", 1);
            req.onupgradeneeded = function() { req.result.createObjectStore("files"); };
            req.onsuccess = function() { resolve(req.result); };
            req.onerror = function() { reject(req.error); };
          });
        }

        var idbPromise = null;
        function getIDB() {
          if (!idbPromise) idbPromise = openIDB();
          return idbPromise;
        }

        function idbGet(db, key) {
          return new Promise(function(resolve, reject) {
            var tx = db.transaction("files", "readonly");
            var req = tx.objectStore("files").get(key);
            req.onsuccess = function() { resolve(req.result); };
            req.onerror = function() { reject(req.error); };
          });
        }

        function idbPut(db, key, val) {
          return new Promise(function(resolve, reject) {
            var tx = db.transaction("files", "readwrite");
            var req = tx.objectStore("files").put(val, key);
            req.onsuccess = function() { resolve(); };
            req.onerror = function() { reject(req.error); };
          });
        }

        function makeWritable(db, name) {
          var chunks = [];
          return {
            write: function(data) { chunks.push(data instanceof Uint8Array ? data.slice() : new Uint8Array(data)); return Promise.resolve(); },
            close: function() {
              var total = 0;
              chunks.forEach(function(c) { total += c.length; });
              var merged = new Uint8Array(total);
              var off = 0;
              chunks.forEach(function(c) { merged.set(c, off); off += c.length; });
              return idbPut(db, name, merged);
            }
          };
        }

        function makeFakeRoot(db) {
          return {
            getFileHandle: function(name, opts) {
              if (opts && opts.create) {
                return Promise.resolve({
                  getFile: function() {
                    return idbGet(db, name).then(function(data) {
                      return new Blob([data || new Uint8Array(0)]);
                    });
                  },
                  createWritable: function() { return Promise.resolve(makeWritable(db, name)); }
                });
              }
              return idbGet(db, name).then(function(data) {
                if (data === undefined) throw new DOMException("Not found", "NotFoundError");
                return {
                  getFile: function() { return Promise.resolve(new Blob([data])); },
                  createWritable: function() { return Promise.resolve(makeWritable(db, name)); }
                };
              });
            }
          };
        }

        if (navigator.storage) {
          navigator.storage.getDirectory = function() {
            if (originalGetDirectory) {
              return originalGetDirectory().catch(function() {
                return getIDB().then(makeFakeRoot);
              });
            }
            return getIDB().then(makeFakeRoot);
          };
        }
      })();
    </script>

    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    <script>
(async () => {
const BASE = document.querySelector("base").href;
const loading = document.getElementById("loading");
const canvas = document.getElementById("canvas");
const musicChoice = document.getElementById("music-choice");

const storage = await navigator.storage.getDirectory();

async function storageHas(name) {
	try { await storage.getFileHandle(name); return true; } catch { return false; }
}
async function storageRead(name) {
	return new Uint8Array(await (await (await storage.getFileHandle(name)).getFile()).arrayBuffer());
}
async function storageWrite(name, data) {
	const w = await (await storage.getFileHandle(name, { create: true })).createWritable();
	await w.write(data); await w.close();
}

async function downloadTar(base, label) {
	loading.textContent = `Downloading ${label}...`;
	const count = parseInt(await (await fetch(base + ".count")).text());
	const chunks = [];
	let total = 0;
	for (let i = 0; i < count; i++) {
		const res = await fetch(`${base}${String(i).padStart(2, "0")}`);
		if (!res.ok) throw new Error(`Failed: ${res.status}`);
		const reader = res.body.getReader();
		for (;;) {
			const { done, value } = await reader.read();
			if (done) break;
			chunks.push(value);
			total += value.length;
			loading.textContent = `Downloading ${label}... ${(total / 1048576) | 0} MB`;
		}
	}
	const tar = new Uint8Array(total);
	let off = 0;
	for (const c of chunks) { tar.set(c, off); off += c.length; }
	return tar;
}

async function getTar(base, label, key) {
	try {
		loading.textContent = `Loading cached ${label}...`;
		return await storageRead(key);
	} catch {
		const tar = await downloadTar(base, label);
		try { loading.textContent = `Caching ${label}...`; await storageWrite(key, tar); } catch {}
		return tar;
	}
}

const audioCached = await storageHas("ContentAudio.tar");
const wantMusic = audioCached || await new Promise((resolve) => {
	musicChoice.style.display = "";
	document.getElementById("btn-no-music").onclick = () => { musicChoice.style.display = "none"; resolve(false); };
	document.getElementById("btn-with-music").onclick = () => { musicChoice.style.display = "none"; resolve(true); };
});
musicChoice.style.display = "none";

const contentP = getTar("Content.tar", "game content", "Content.tar");
const audioP = wantMusic ? getTar("ContentAudio.tar", "music", "ContentAudio.tar") : Promise.resolve(null);
const runtimeP = (async () => {
	const { dotnet } = await import(BASE + "_framework/dotnet.js");
	return dotnet
		.withModuleConfig({ canvas })
		.withEnvironmentVariable("MONO_SLEEP_ABORT_LIMIT", "99999")
		.withRuntimeOptions([
			`--jiterpreter-minimum-trace-hit-count=${500}`,
			`--jiterpreter-trace-monitoring-period=${100}`,
			`--jiterpreter-trace-monitoring-max-average-penalty=${150}`,
			`--jiterpreter-wasm-bytes-limit=${64 * 1024 * 1024}`,
			`--jiterpreter-table-size=${32 * 1024}`,
		])
		.withResourceLoader((type, _name, defaultUri, _integrity, behavior) => {
			if (type === "dotnetwasm" && behavior === "dotnetwasm") {
				return (async () => {
					const count = parseInt(await (await fetch(defaultUri + ".count")).text());
					let idx = 0;
					const fetchNext = async () => {
						if (idx >= count) return null;
						const res = await fetch(defaultUri + idx);
						idx++;
						return res.ok ? res.body.getReader() : null;
					};
					let current = await fetchNext();
					if (!current) throw new Error("failed to fetch first wasm chunk");
					return new Response(new ReadableStream({
						async pull(controller) {
							const { value, done } = await current.read();
							if (done || !value) {
								current = await fetchNext();
								if (current) await this.pull(controller);
								else controller.close();
							} else controller.enqueue(value);
						},
					}), { headers: { "Content-Type": "application/wasm" } });
				})();
			}
		})
		.create();
})();

const [contentTar, audioTar, runtime] = await Promise.all([contentP, audioP, runtimeP]);
const exports = await runtime.getAssemblyExports(runtime.getConfig().mainAssemblyName);

function extractTar(tar, prefix) {
	let pos = 0, count = 0;
	const dec = new TextDecoder();
	const str = (buf, o, n) => { let e = o; while (e < o + n && buf[e]) e++; return dec.decode(buf.subarray(o, e)); };
	const oct = (buf, o, n) => { const s = str(buf, o, n).trim(); return s ? parseInt(s, 8) : 0; };
	while (pos + 512 <= tar.length) {
		const h = tar.subarray(pos, pos + 512);
		if (!h[0]) break;
		const name = str(h, 0, 100), size = oct(h, 124, 12), type = h[156];
		const pref = str(h, 345, 155);
		const full = pref ? pref + "/" + name : name;
		pos += 512;
		if (type === 53 || name.endsWith("/")) {
			exports.WasmBootstrap.CreateContentDirectory(prefix + full);
		} else if (type === 48 || type === 0) {
			exports.WasmBootstrap.WriteContentFile(prefix + full, tar.subarray(pos, pos + size));
			count++;
		}
		pos += Math.ceil(size / 512) * 512;
	}
	return count;
}

await runtime.runMain();
await exports.WasmBootstrap.PreInit();

try {
	const savesTar = await storageRead("Saves.tar");
	exports.WasmBootstrap.CreateContentDirectory("/libsdl/saves/Saves");
	extractTar(savesTar, "/libsdl/saves/Saves/");
} catch {}

loading.textContent = "Loading game files...";
extractTar(contentTar, "/libsdl/");
if (audioTar) { loading.textContent = "Loading music..."; extractTar(audioTar, "/libsdl/"); }

loading.classList.add("hidden");

const dpr = window.devicePixelRatio || 1;
const w = Math.round(canvas.clientWidth * dpr) || 1280;
const h = Math.round(canvas.clientHeight * dpr) || 720;
await exports.WasmBootstrap.Init(w, h);

new ResizeObserver(() => {
	const dpr = window.devicePixelRatio || 1;
	const nw = Math.round(canvas.clientWidth * dpr);
	const nh = Math.round(canvas.clientHeight * dpr);
	if (nw > 0 && nh > 0) try { exports.WasmBootstrap.Resize(nw, nh); } catch {}
}).observe(canvas);

try { navigator.keyboard?.lock(); } catch {}
document.addEventListener("keydown", (e) => {
	if (["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Tab"].includes(e.code))
		e.preventDefault();
});

await exports.WasmBootstrap.MainLoop();
})();
    </script>
  </body>
</html>
