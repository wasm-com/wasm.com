<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>Pathogenic</title>
		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

body {
	color: white;
	background-color: black;
	overflow: hidden;
	touch-action: none;
}

#canvas {
	display: block;
}

#canvas:focus {
	outline: none;
}

#status, #status-splash, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash {
	top: 0;
	bottom: 0;
}

#status {
	background-color: #000000;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

#status-splash {
	max-height: 100%;
	max-width: 100%;
	margin: auto;
}

#status-splash.show-image--false {
	display: none;
}

#status-splash.fullsize--true {
	height: 100%;
	width: 100%;
	object-fit: contain;
}

#status-splash.use-filter--false {
	image-rendering: pixelated;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	bottom: 10%;
	width: 50%;
	margin: 0 auto;
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}
		</style>
		<link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png" />
<link rel="apple-touch-icon" href="index.apple-touch-icon.png"/>

	</head>
	<body>
		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>

		<noscript>
			Your browser does not support JavaScript.
		</noscript>

		<div id="status">
			<img id="status-splash" class="show-image--true fullsize--true use-filter--true" src="index.png" alt="">
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<script src="index.js"></script>
	<script>
(function() {
'use strict';
const BASE = `https://cdn.jsdelivr.net/gh/wasm.com/wasm.com/files/patho`;
const TOTAL_MB = "163.00"; 

const originalFetch = window.fetch;
const mergedData = {};
const pendingRequests = {};
let bytesLoadedSoFar = 0;

const statusEl = document.getElementById('status');


function updateStatus(currentBytes) {
    const currentMB = (currentBytes / 1048576).toFixed(2);
    statusEl.innerHTML = `<i class="fas fa-sync-alt fa-spin"></i> LOADING: ${currentMB} / ${TOTAL_MB} MB`;
}

window.fetch = function(url, ...args) {
    const u = url.toString();
    if (u.includes("index.pck") || u.includes("index.wasm")) {
        const f = u.includes(".pck") ? "index.pck" : "index.wasm";
        if (mergedData[f]) return Promise.resolve(new Response(mergedData[f]));
        return new Promise((resolve) => {
            if (!pendingRequests[f]) pendingRequests[f] = [];
            pendingRequests[f].push(resolve);
        });
    }
    return originalFetch(url, ...args);
};

async function merge(name, start, end) {
    const bufs = [];
    for (let i = start; i <= end; i++) {
        const url = BASE + encodeURIComponent(name + ".part" + i);
        const r = await originalFetch(url);
        if (!r.ok) throw new Error();
        const data = await r.arrayBuffer();
        bufs.push(data);
        bytesLoadedSoFar += data.byteLength;
        updateStatus(bytesLoadedSoFar);
    }
    const b = new Blob(bufs, { type: 'application/octet-stream' });
    mergedData[name] = b;
    if (pendingRequests[name]) {
        pendingRequests[name].forEach(res => res(new Response(b)));
        delete pendingRequests[name];
    }
}

async function init() {
    try {
        // Load all 10 binary parts
        await merge("index.pck", 1, 8);
        await merge("index.wasm", 1, 2);
        
        const s = document.createElement('script');
        s.src = BASE + "index.js";
        s.onload = () => {
            const engine = new Engine({
                "args":[],
                "canvasResizePolicy":2,
                "executable":"index",
                "fileSizes":{"index.pck":144746880,"index.wasm":26156492},
                "focusCanvas":true
            });

            engine.startGame({
                onProgress: (current, total) => { 
                    if (total > 0) {
                       
                        updateStatus(bytesLoadedSoFar); 
                    }
                }
            }).then(() => {
                statusEl.style.display = 'none';
                window.dispatchEvent(new Event('resize'));
            });
        };
        document.body.appendChild(s);
    } catch (e) {
        statusEl.innerHTML = `<i class="fas fa-exclamation-triangle"></i> LOAD ERROR`;
    }
}
init();
})();
</script>
	</body>
</html>
